<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naitik All-In-One Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. ID के साथ मुख्य हेडिंग (Block) -->
    <h1 id="main-title"><center>My Japan Dream Dashboard</center></h1>
    <hr>

    <!-- 2. पैराग्राफ और इनलाइन टैग्स का खेल -->
    <p>I am Naitik. I want to learn <strong>Full Stack Development</strong> and go to <span>Tokyo</span>.</p>

    <!-- 3. इमेज टैग (Inline) -->
    <center>
        <img src="tokyo.jpg" alt="Tokyo Tower" width="300px">
    </center>

    <!-- 4. क्लास के साथ लिस्ट (Block) -->
    <h3>My Goals for 2026:</h3>
    <ul class="goal-list">
        <li>Complete HTML & CSS</li>
        <li>Learn Japanese Language (JLPT N5)</li>
        <li>Code 3 hours daily</li>
    </ul>

    <!-- 5. एक साफ़ सुथरी टेबल (Block) -->
    <h3>Skills Status Table:</h3>
    <table border="1" cellspacing="0" cellpadding="8">
        <tr>
            <th>Technology</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>HTML</td>
            <td>Almost Done</td>
        </tr>
        <tr>
            <td>CSS</td>
            <td>Starting Soon</td>
        </tr>
    </table>

    <!-- 6. एक छोटा सा लॉगिन फॉर्म (Block) -->
    <h3>Quick Login Form:</h3>
    <form>
        <div>
            <label>Username:</label>
            <input type="text" placeholder="Enter Username">
        </div>
        <br>
        <div>
            <label>Password:</label>
            <input type="password" placeholder="Enter Password">
        </div>
        <br>
        <button type="submit">Log In</button>
    </form>

</body>
</html>
